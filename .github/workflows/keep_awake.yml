name: Keep Multiple Streamlit Apps Awake

on:
  schedule:
    # 6時間おきに実行（日本時間 9:00, 15:00, 21:00, 03:00）
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping_apps:
    runs-on: ubuntu-latest
    steps:
      - name: Send ping to Apps
        run: |
          echo "Accessing App 1..."
          curl -I -L -s --max-time 10 https://ri2maps-app-mlsmfzqnbdkaengohbxwwg.streamlit.app/ || echo "App 1 failed"
          
          echo "Accessing App 2..."
          curl -I -L -s --max-time 10 https://platformroad2-wlyzi2hiypbncesd8yyx9q.streamlit.app/ || echo "App 2 failed"
          
          echo "Accessing App 3..."
          curl -I -L -s --max-time 10 https://my-jartic-app-cjxyuqz6kfvfaa2xxhfhgh.streamlit.app/ || echo "App 3 failed"
